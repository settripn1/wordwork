// ── HELPERS ──────────────────────────────────────────────────────────────────
function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}
function getMasteryLevel(mastery, word) {
  return Math.min(5, Math.max(0, mastery[word.toLowerCase()] || 0));
}

// Weighted spaced repetition queue — feels random but is purposeful
// Weak words appear 8× more than mastered words
const WEIGHTS = [8, 6, 4, 2, 1, 0.4];
function buildQueue(words, mastery, category, customWords) {
  const pool = category === 'All' ? [...words, ...customWords] : [...words, ...customWords].filter(w => w.category === category);
  if (!pool.length) return [];
  const getLevel = w => getMasteryLevel(mastery, w.word);
  const target = Math.min(pool.length, SESSION_SIZE);

  // Sort into tiers
  const weak = shuffle(pool.filter(w => getLevel(w) <= 1));
  const medium = shuffle(pool.filter(w => getLevel(w) >= 2 && getLevel(w) <= 3));
  const strong = shuffle(pool.filter(w => getLevel(w) >= 4));
  const queue = [];
  const used = new Set();

  // Fill ~60% with weak words
  const weakTarget = Math.min(weak.length, Math.ceil(target * 0.6));
  for (const w of weak) {
    if (queue.length >= weakTarget) break;
    if (!used.has(w.word)) {
      queue.push(w);
      used.add(w.word);
    }
  }

  // Fill ~30% with medium words
  const medTarget = Math.min(medium.length, Math.ceil(target * 0.3));
  for (const w of medium) {
    if (queue.length >= weakTarget + medTarget) break;
    if (!used.has(w.word)) {
      queue.push(w);
      used.add(w.word);
    }
  }

  // Fill rest with strong/mastered (confidence boost)
  for (const w of strong) {
    if (queue.length >= target) break;
    if (!used.has(w.word)) {
      queue.push(w);
      used.add(w.word);
    }
  }

  // If still short, pad from any pool
  for (const w of shuffle(pool)) {
    if (queue.length >= target) break;
    if (!used.has(w.word)) {
      queue.push(w);
      used.add(w.word);
    }
  }
  return shuffle(queue);
}

// ── VOICE ENGINE ─────────────────────────────────────────────────────────────
function getEnglishVoices() {
  return (window.speechSynthesis?.getVoices() || []).filter(v => v.lang.startsWith('en'));
}
const PREFERRED_VOICES = ['Google US English', 'Microsoft Aria Online (Natural) - English (United States)', 'Microsoft Guy Online (Natural) - English (United States)', 'Microsoft Jenny Online (Natural) - English (United States)', 'Samantha', 'Alex', 'Karen', 'Google UK English Female', 'Google UK English Male'];
function pickBestVoice(voices, preferred) {
  if (preferred) {
    const match = voices.find(v => v.name === preferred);
    if (match) return match;
  }
  for (const name of PREFERRED_VOICES) {
    const v = voices.find(v => v.name === name);
    if (v) return v;
  }
  return voices[0] || null;
}
function speakWord(text, voice, rate = 0.82, pitch = 1) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  if (voice) u.voice = voice;
  u.rate = rate;
  u.pitch = pitch;
  window.speechSynthesis.speak(u);
}

  const bestStreak = store.bestStreak || 0;
  const totalSessions = store.totalSessions || 0;
  function updateStore(patch) {
    setStore(prev => {
      const next = {
        ...prev,
        ...patch
      };
      saveStorage(next);
      return next;
    });
  }

  // Screens: home | practice | results | manage | stats
  const [screen, setScreen] = useState('home');
  const [selCat, setSelCat] = useState('All');
  const [queue, setQueue] = useState([]);
  const [qIdx, setQIdx] = useState(0);
  const [input, setInput] = useState('');
  const [revealed, setRevealed] = useState(false);
  const [results, setResults] = useState([]);
  const [feedback, setFeedback] = useState(null); // null | 'correct' | 'wrong'
  const [streak, setStreak] = useState(0);
  const [sessionStreak, setSessionStreak] = useState(0);

  // Custom words
  const [customWords, setCustomWords] = useState(() => store.customWords || []);
  const [newWord, setNewWord] = useState('');
  const [newHint, setNewHint] = useState('');

  // Voice
  const [voices, setVoices] = useState([]);
  const [selectedVoice, setSelectedVoice] = useState(null);
  const [voiceRate, setVoiceRate] = useState(() => store.voiceRate || 0.82);
  const [showSettings, setShowSettings] = useState(false);
  const inputRef = useRef(null);
  const allWords = useMemo(() => [...ALL_WORDS, ...customWords], [customWords]);

  // Load voices
  useEffect(() => {
    function load() {
      const v = getEnglishVoices();
      if (v.length) {
        setVoices(v);
        setSelectedVoice(pickBestVoice(v, store.voiceName));
      }
    }
    load();
    if (window.speechSynthesis) {
      window.speechSynthesis.addEventListener('voiceschanged', load);
      return () => window.speechSynthesis.removeEventListener('voiceschanged', load);
    }
  }, []);
  const doSpeak = useCallback(text => {
    speakWord(text, selectedVoice, voiceRate);
  }, [selectedVoice, voiceRate]);

  // Current word
  const cw = queue[qIdx];

  // Start practice
  function startPractice() {
    const q = buildQueue(ALL_WORDS, mastery, selCat, customWords);
    setQueue(q);
    setQIdx(0);
    setInput('');
    setRevealed(false);
    setResults([]);
    setStreak(0);
    setSessionStreak(0);
    setFeedback(null);
    setScreen('practice');
    setTimeout(() => {
      if (q[0]) doSpeak(q[0].word);
      inputRef.current?.focus();
    }, 350);
  }

  // Advance after answer
  const advance = useCallback(res => {
    const delay = res === 'correct' ? 520 : 1050;
    setTimeout(() => {
      setFeedback(null);
      const next = qIdx + 1;
      if (next >= queue.length) {
        updateStore({
          totalSessions: totalSessions + 1
        });
        setScreen('results');
      } else {
        setQIdx(next);
        setInput('');
        setRevealed(false);
        doSpeak(queue[next].word);
        setTimeout(() => inputRef.current?.focus(), 80);
      }
    }, delay);
  }, [qIdx, queue, doSpeak, totalSessions]);

  // Check answer
  const check = useCallback(() => {
    if (!input.trim() || feedback || !cw) return;
